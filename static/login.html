<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaveHeart - Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --purple: #7C3AED;
  --purple-light: #A78BFA;
  --purple-dark: #5B21B6;
  --purple-glow: rgba(124,58,237,0.15);
  --green-accent: #22C55E;
  --bg-deep: #08060F;
  --bg-surface: #110E1A;
  --bg-card: #18142A;
  --bg-elevated: #1F1A35;
  --bg-input: #13102080;
  --text: #F1F0F5;
  --text-secondary: #A09CB2;
  --text-tertiary: #6B6580;
  --border: rgba(124,58,237,0.15);
  --border-strong: rgba(124,58,237,0.3);
  --radius: 14px;
  --radius-sm: 10px;
  --font-heading: 'Playfair Display', Georgia, 'Times New Roman', serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --transition: 0.2s ease;
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font-body);
  color: var(--text);
  background: var(--bg-deep);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Mesh background */
.mesh-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.mesh-bg::before {
  content: '';
  position: absolute;
  top: 20%; left: -10%; width: 120%; height: 80%;
  background:
    radial-gradient(ellipse 80% 50% at 30% 60%, rgba(124,58,237,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 70% 50%, rgba(34,197,94,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 90% 60% at 50% 80%, rgba(124,58,237,0.06) 0%, transparent 50%);
  animation: meshDrift 20s ease-in-out infinite alternate;
}
.mesh-bg::after {
  content: '';
  position: absolute;
  top: 10%; right: -5%; width: 60%; height: 80%;
  background:
    radial-gradient(ellipse 70% 50% at 60% 40%, rgba(34,197,94,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at 40% 60%, rgba(124,58,237,0.08) 0%, transparent 50%);
  animation: meshDrift 25s ease-in-out infinite alternate-reverse;
}
@keyframes meshDrift {
  0% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.02); }
  100% { transform: translateY(10px) scale(0.98); }
}
.mesh-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
  background-image:
    linear-gradient(rgba(124,58,237,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 60%, black 20%, transparent 70%);
}

/* Login card */
.login-container {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  padding: 0 20px;
}

.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 48px 36px 40px;
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 60px rgba(124,58,237,0.08);
}

/* Brand */
.login-brand {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  margin-bottom: 36px;
}

.login-brand svg {
  width: 48px; height: 32px; color: var(--purple);
}

.login-brand h1 {
  font-family: var(--font-heading);
  font-size: 1.6rem; font-weight: 600;
  letter-spacing: -0.02em;
}

.login-brand p {
  color: var(--text-secondary); font-size: 0.88rem;
}

/* Tabs */
.auth-tabs {
  display: flex; gap: 0; margin-bottom: 28px;
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
  padding: 3px;
}

.auth-tab {
  flex: 1; padding: 10px 0;
  background: none; border: none; color: var(--text-tertiary);
  font-size: 0.88rem; font-weight: 500;
  border-radius: 8px; cursor: pointer;
  transition: var(--transition);
}

.auth-tab.active {
  background: var(--bg-card);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

/* Form */
.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block; font-size: 0.82rem; font-weight: 500;
  color: var(--text-secondary); margin-bottom: 6px;
}

.form-group input {
  width: 100%; padding: 12px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-size: 0.92rem;
  font-family: var(--font-body);
  transition: var(--transition);
  outline: none;
}

.form-group input:focus {
  border-color: var(--purple);
  box-shadow: 0 0 0 3px var(--purple-glow);
}

.form-group input::placeholder {
  color: var(--text-tertiary);
}

.btn-primary {
  width: 100%; padding: 13px 0;
  background: var(--purple);
  border: none; border-radius: var(--radius-sm);
  color: white; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: var(--transition);
  margin-top: 6px;
}

.btn-primary:hover {
  background: var(--purple-dark);
  box-shadow: 0 0 20px rgba(124,58,237,0.3);
}

.btn-primary:disabled {
  opacity: 0.5; cursor: not-allowed;
}

/* Divider */
.divider {
  display: flex; align-items: center; gap: 16px;
  margin: 24px 0;
}

.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: var(--border);
}

.divider span {
  font-size: 0.8rem; color: var(--text-tertiary); white-space: nowrap;
}

/* Google button */
.btn-google {
  width: 100%; padding: 12px 0;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-size: 0.92rem; font-weight: 500;
  cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}

.btn-google:hover {
  background: var(--bg-card);
  border-color: var(--border-strong);
}

.btn-google svg {
  width: 20px; height: 20px;
}

/* Error / message */
.auth-message {
  padding: 10px 14px; border-radius: 8px;
  font-size: 0.85rem; margin-bottom: 16px;
  display: none;
}

.auth-message.error {
  display: block;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: #FCA5A5;
}

.auth-message.success {
  display: block;
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.2);
  color: #86EFAC;
}

/* Demo link */
.demo-link {
  text-align: center; margin-top: 20px;
}

.demo-link a {
  color: var(--text-tertiary); font-size: 0.82rem;
  cursor: pointer; transition: var(--transition);
}

.demo-link a:hover { color: var(--purple-light); }
</style>
</head>
<body>

<div class="mesh-bg"></div>
<div class="mesh-grid"></div>

<div class="login-container">
  <div class="login-card">
    <div class="login-brand">
      <svg viewBox="0 0 52 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 18 C4 10, 10 4, 18 7 C16 12, 17 17, 20 19"/>
        <path d="M50 18 C48 10, 42 4, 34 7 C36 12, 35 17, 32 19"/>
        <ellipse cx="26" cy="17" rx="7" ry="8"/>
        <path d="M21 12 L19 5 L23 11"/>
        <path d="M31 12 L33 5 L29 11"/>
        <path d="M23 16 Q24 14 26 16 Q28 14 29 16 L26 20 Z"/>
      </svg>
      <h1>WaveHeart</h1>
      <p>Searching for a Soulmate</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="authMessage" class="auth-message"></div>

    <form id="authForm" onsubmit="handleSubmit(event)">
      <div class="form-group" id="nameGroup" style="display:none">
        <label>Display Name</label>
        <input type="text" id="displayName" placeholder="Your name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
    </form>

    <div class="divider"><span>or continue with</span></div>

    <button class="btn-google" onclick="googleLogin()">
      <svg viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="demo-link">
      <a onclick="window.location.href='/'">Skip login, try Demo mode</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ─── Supabase Config ──────────────────────────────────────────────────────────
let supabase = null;
let currentTab = 'login';

(async () => {
  // Fetch Supabase config from server
  try {
    const resp = await fetch('/api/config');
    const cfg = await resp.json();
    if (cfg.supabase_url && cfg.supabase_anon_key) {
      supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
    }
  } catch (e) { console.warn('Config not available:', e); }

  // Check if already logged in
  if (!supabase) return;
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    window.location.href = '/';
  }
})();

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.auth-tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
  });
  document.getElementById('nameGroup').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('submitBtn').textContent = tab === 'login' ? 'Sign In' : 'Sign Up';
  hideMessage();
}

function showMessage(text, type = 'error') {
  const el = document.getElementById('authMessage');
  el.textContent = text;
  el.className = 'auth-message ' + type;
}

function hideMessage() {
  document.getElementById('authMessage').className = 'auth-message';
}

async function handleSubmit(e) {
  e.preventDefault();
  hideMessage();

  if (!supabase) {
    showMessage('Supabase not configured. Use Demo mode instead.');
    return;
  }

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');

  btn.disabled = true;
  btn.textContent = currentTab === 'login' ? 'Signing in...' : 'Creating account...';

  try {
    if (currentTab === 'login') {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      localStorage.setItem('sb_access_token', data.session.access_token);
      window.location.href = '/';
    } else {
      const displayName = document.getElementById('displayName').value;
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { full_name: displayName } },
      });
      if (error) throw error;
      if (data.user && !data.session) {
        showMessage('Check your email for a confirmation link.', 'success');
      } else if (data.session) {
        localStorage.setItem('sb_access_token', data.session.access_token);
        window.location.href = '/';
      }
    }
  } catch (err) {
    showMessage(err.message || 'Authentication failed');
  } finally {
    btn.disabled = false;
    btn.textContent = currentTab === 'login' ? 'Sign In' : 'Sign Up';
  }
}

async function googleLogin() {
  if (!supabase) {
    showMessage('Supabase not configured. Use Demo mode instead.');
    return;
  }

  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + '/',
    },
  });
  if (error) showMessage(error.message);
}

// Listen for auth state changes (handles OAuth callback)
if (supabase) {
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      localStorage.setItem('sb_access_token', session.access_token);
      window.location.href = '/';
    }
  });
}
</script>
</body>
</html>
